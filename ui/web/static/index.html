<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>社会模拟 · 观察台</title>
<style>
  :root {
    --bg: #14161a; --panel: #1b1e24; --line: #2a2f38;
    --fg: #e6e8eb; --dim: #8b929c; --accent: #6ea8fe;
    --speak: #e6e8eb; --inner: #7d8694; --act: #e0b65a;
    --move: #6fb98f; --world: #c98ad6; --terminal: #e06c75;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--line);
  }
  header .title { font-weight: 600; }
  header .status { color: var(--dim); font-size: 13px; }
  header .spacer { flex: 1; }
  button {
    background: #262b33; color: var(--fg); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #0c1320; border-color: var(--accent); }
  label.toggle { color: var(--dim); font-size: 13px; cursor: pointer; user-select: none; }
  #stream {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }
  .tick-sep {
    margin: 18px 0 8px; color: var(--accent); font-size: 12px;
    letter-spacing: .5px; border-bottom: 1px dashed var(--line); padding-bottom: 4px;
  }
  .ev { padding: 2px 0; display: flex; gap: 8px; }
  .ev .who { color: var(--dim); min-width: 96px; text-align: right; flex-shrink: 0; }
  .ev .body { flex: 1; }
  .ev .tag {
    display: inline-block; font-size: 11px; color: var(--dim);
    border: 1px solid var(--line); border-radius: 4px; padding: 0 5px; margin-right: 6px;
  }
  .ev.speak .body { color: var(--speak); }
  .ev.inner { color: var(--inner); font-style: italic; }
  .ev.act .body { color: var(--act); }
  .ev.move .body { color: var(--move); }
  .ev.world .who, .ev.world .body { color: var(--world); }
  .ev.hidden { display: none; }
  .terminal {
    margin: 24px 0; padding: 14px; text-align: center; color: var(--terminal);
    border: 1px solid var(--terminal); border-radius: 8px; font-weight: 600;
  }
  .conn-lost { color: var(--terminal); }
</style>
</head>
<body>
<header>
  <span class="title">社会模拟 · 观察台</span>
  <span class="status" id="status">连接中…</span>
  <span class="spacer"></span>
  <label class="toggle"><input type="checkbox" id="showInner" checked> 内心(心声·盘算)</label>
  <button id="btnStep">步进</button>
  <button id="btnRun" class="primary">自动</button>
  <button id="btnPause">暂停</button>
</header>
<div id="stream"></div>

<script>
const stream = document.getElementById("stream");
const statusEl = document.getElementById("status");
const showInner = document.getElementById("showInner");

// 动作类型 → (中文标签, 样式类)。think/plan 为内心(PRIVATE)。
const TYPE_META = {
  speak:   ["说",   "speak"],
  silence: ["沉默", "speak"],
  act:     ["做",   "act"],
  move:    ["移动", "move"],
  think:   ["心声", "inner"],
  plan:    ["盘算", "inner"],
};

function sceneLabel(time) {
  if (time.scene) {
    const s = time.scene;
    return `Day ${s.day} · ${s.phase}（${s.tick_in_phase}）`;
  }
  return `第 ${time.tick} 拍`;
}

function atBottom() {
  return stream.scrollHeight - stream.scrollTop - stream.clientHeight < 60;
}
function maybeScroll(was) { if (was) stream.scrollTop = stream.scrollHeight; }

function renderTick(msg) {
  const div = document.createElement("div");
  div.className = "tick-sep";
  div.textContent = "── " + sceneLabel(msg.time) + " ──";
  stream.appendChild(div);
}

function renderEvent(msg) {
  const ev = msg.event;
  const [label, cls] = TYPE_META[ev.type] || [ev.type, ""];
  const isInner = ev.visibility === "private";
  const isWorld = msg.actor_name === "旁白";

  const row = document.createElement("div");
  row.className = "ev " + cls + (isWorld ? " world" : "") + (isInner ? " inner" : "");
  if (isInner) row.dataset.inner = "1";
  if (isInner && !showInner.checked) row.classList.add("hidden");

  const who = document.createElement("span");
  who.className = "who";
  who.textContent = msg.actor_name + " @" + msg.location_name;

  const body = document.createElement("span");
  body.className = "body";
  const tag = document.createElement("span");
  tag.className = "tag";
  tag.textContent = label;
  body.appendChild(tag);
  body.appendChild(document.createTextNode(ev.content));

  row.appendChild(who);
  row.appendChild(body);
  stream.appendChild(row);
}

function renderTerminal(msg) {
  const div = document.createElement("div");
  div.className = "terminal";
  div.textContent = "【终局】" + msg.terminal_event;
  stream.appendChild(div);
}

function handle(msg) {
  const was = atBottom();
  if (msg.kind === "tick") renderTick(msg);
  else if (msg.kind === "event") renderEvent(msg);
  else if (msg.kind === "terminal") renderTerminal(msg);
  maybeScroll(was);
}

// 内心图层开关:整体显隐已渲染的 PRIVATE 行。
showInner.addEventListener("change", () => {
  document.querySelectorAll('.ev[data-inner="1"]').forEach(row => {
    row.classList.toggle("hidden", !showInner.checked);
  });
});

// 控制按钮 → REST(瞬时返回)。
const post = (path) => fetch(path, { method: "POST" }).then(r => r.json()).then(updateStatus);
document.getElementById("btnStep").onclick = () => post("/api/step");
document.getElementById("btnRun").onclick = () => post("/api/run");
document.getElementById("btnPause").onclick = () => post("/api/pause");

function updateStatus(st) {
  if (!st) return;
  const mode = st.running ? "自动推进中" : (st.step_budget > 0 ? "步进中" : "暂停");
  const term = st.terminal ? " · 已近终局" : "";
  statusEl.textContent = `${mode} · 第 ${st.tick} 拍${term}`;
  statusEl.classList.remove("conn-lost");
}

// websocket:实时信号流(新连接先收到完整历史回放)。
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (e) => handle(JSON.parse(e.data));
  ws.onopen = () => fetch("/api/state").then(r => r.json()).then(updateStatus);
  ws.onclose = () => {
    statusEl.textContent = "连接断开,重连中…";
    statusEl.classList.add("conn-lost");
    setTimeout(connect, 1500);
  };
}
connect();
</script>
</body>
</html>
