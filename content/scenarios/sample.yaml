# ============================================================================
# 样例 / 模板场景:小镇咖啡馆的最后一夜
# ----------------------------------------------------------------------------
# 这份文件既是一个能直接跑的样例,也是写新剧本的【模板】。
# 想加新场景:复制本文件 → 改名 content/scenarios/<你的名字>.yaml → 改下面的内容。
# 加载时不用碰任何代码,run.py 里把 SCENARIO 改成你的文件名即可。
#
# 这是一个【社会模拟】,不是任务关卡。好剧本的核心不是"目标",而是【张力】:
# 每个人嘴上说的(public_persona)和心里想的(private_goal/secret)要互相打架,
# 几个人的秘密之间最好会撞车,关系网里要有不对等——这样把他们关进同一段时间、
# 同一组地点里,戏会自己长出来。火种(突发事件)运行时由导演临场注入,不写在这里。
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━ 字段速查表(SCHEMA)━━━━━━━━━━━━━━━━━━━━━━━━━━
# calendar:                  时间结构(必填)
#   total_days:      int     总天数,正整数
#   phases:          [str]   一天里的阶段,按时间先后排,非空列表
#   ticks_per_phase: int     每个阶段几拍(每拍 = 每个 agent 行动一次),正整数
#   terminal_event:  str     时间走完那一刻发生的大事,给所有人一个"截止"的压迫感
#   # 总拍数 = total_days × len(phases) × ticks_per_phase,到点后模拟结束
#
# locations:                 地点列表(必填,至少 1 个)
#   - id:          str       唯一标识,被 agent.location_id 引用,别写重复
#     name:        str       显示名
#     description: str       环境描写(可选);写得有"戏味"能诱发行为,见下方示例
#
# agents:                    角色列表(必填,至少 1 个)
#   - id:             str    唯一标识,被别的 agent 的 relationships 的 key 引用
#     name:           str    显示名
#     location_id:    str    起始位置,【必须】等于某个 location 的 id,否则加载报错
#     public_persona: str    别人能看到的样子:外在人设、说话方式、此刻的表演
#     private_goal:   str    它真正想要的(私密),驱动一切行为的内在动机
#     secret:         str    被戳破会出事的东西(私密),戏剧炸点的来源
#     plan:           str    当前短期打算(可选),会逐回合自我更新,可留空字符串
#     beliefs:        [str]  持久信念(可选),一般开局留空 [],由导演运行时植入
#     relationships:  {id:int}  对其他 agent 的好感/信任,-100..100。
#                              key 必须是真实存在的 agent id,且不能指向自己。
#                              数值不必对称(A 对 B 的好感 ≠ B 对 A),不对等正是摩擦来源。
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 写作小贴士(也适用于让 AI 生成):
#   1. public 与 private 一定要错位——表里如一的角色没有戏。
#   2. 让秘密之间有交集:A 想藏的东西,恰好是 B 想挖的东西。
#   3. 地点要少而有用:每个地点都该能让人"独处密谋"或"被迫对峙"。
#   4. 关系数值要有高有低、有不对称,别全填中间值。
#   5. prose 用 YAML 的 >- 折叠块写:换行只是为了好读,加载后会拼成一段。
# ============================================================================


# —— 时间:被压在一个傍晚到深夜里(1 天 × 3 阶段 × 4 拍 = 12 拍)——
calendar:
  total_days: 1
  phases: ["黄昏", "打烊前", "深夜"]   # 顺序即时间顺序
  ticks_per_phase: 4
  terminal_event: "天亮 · 咖啡馆正式易主"   # 到点就尘埃落定,给全场一个倒计时


# —— 空间:三个能让人独处或对峙的角落 ——
# 描写不只是布景:抽屉里的文件、对面的连锁店招牌,都是能勾出行为的"钩子"。
locations:
  - id: counter            # ← 被 agent.location_id 引用,改这里记得同步改引用
    name: 吧台
    description: >-
      最后一炉豆子还在磨,蒸汽机嘶嘶作响。墙上贴满了十二年来熟客的拍立得,
      边角都卷了。收银台抽屉半开着,里面除了零钱,还压着一份没人该看见的文件。

  - id: window_seat
    name: 临窗卡座
    description: >-
      靠街的长椅卡座,旧皮面磨得发亮。窗外是渐暗的小镇街道和对面新开的连锁店招牌,
      暖黄的光打进来,适合说些白天不好意思说的话。

  - id: backyard
    name: 后院
    description: >-
      堆着空奶箱和一棵长歪的桂花树。夏夜里偶尔有人躲到这里抽烟、打一个不想被听见的电话,
      门一关,吧台那边的喧闹就只剩隔着玻璃的影子。


# —— 角色:每个人都有一层给别人看的,和一层只有自己知道的 ——
agents:

  # 第一个角色写满注释,当作"逐字段范例";后两个照葫芦画瓢即可。
  - id: zhou                # 唯一 id,被下面 lin / man 的 relationships 当 key 引用
    name: 老周
    location_id: counter    # 必须是上面某个 location 的 id
    # public_persona:别人眼里的他 + 此刻在演的样子
    public_persona: >-
      咖啡馆老板,五十出头,围裙永远系得一丝不苟。今晚一直笑着张罗,
      说什么"开心点,咱们是办散伙饭不是办丧事",给每个进门的人都续上一杯。
    # private_goal:他真正想要的(别人不知道)——所有行为的内在动机
    private_goal: >-
      想让所有人都以为他是被房租逼得不得已才关店,体面地、被同情地退场——
      绝不能让人发现真相,更不能让小满知道。
    # secret:被戳破就出事的炸点。注意它和小满、林姐的秘密是【咬合】的
    secret: >-
      他其实三个月前就主动把店盘给了对面那家连锁品牌,价钱不低。
      合同就压在收银台抽屉里。他没破产,他是套现走人,只是说不出口。
    # plan:短期打算,运行时会被它自己一拍拍更新;可留 "" 让它自行规划
    plan: >-
      把话题死死按在"怀旧"和"房东无情"上,一旦有人靠近吧台抽屉就找借口支开,
      实在不行就提议大家去后院或卡座坐,把人从收银台引开。
    beliefs: []             # 开局留空,信念由导演运行时植入
    # relationships:对其他 agent 的好感/信任,-100..100;key 必须是真实 agent id
    relationships:
      lin: 60               # 对林姐:熟络信任(但他不知道她的真实身份)
      man: 75               # 对小满:像对待晚辈,有愧疚

  - id: lin
    name: 林姐
    location_id: window_seat
    public_persona: >-
      雷打不动的老主顾,每天下午三点那杯手冲是她的固定仪式。今晚红着眼眶,
      一遍遍说这家店是她在这个镇上唯一的念想,语气里全是不舍。
    private_goal: >-
      想在不暴露身份的前提下,确认老周到底有没有把店"干净地"交接清楚,
      并尽量让小满平稳留下来——因为新东家需要一个熟悉老客的人。
    secret: >-
      她不只是熟客。她是对面那家连锁品牌派来的区域顾问,这次收购的接洽人就是她。
      她和老周早就谈妥了,今晚的不舍有几分真、几分是演给小满看的,她自己也分不清。
    plan: >-
      装作和大家一样被蒙在鼓里,旁敲侧击试探小满对未来的打算,
      适时替老周打圆场,把任何指向收银台和合同的怀疑都轻轻带过去。
    beliefs: []
    relationships:
      zhou: 50              # 对老周:合作者之间的客气,谈不上多深
      man: 40              # 对小满:有用之人,带着算计的善意

  - id: man
    name: 小满
    location_id: counter
    public_persona: >-
      二十出头的店员,在这儿打了三年工,手艺是老周一手教的。今晚最忙也最沉默,
      默默擦着每一台机器,像是想把这家店的样子记进手里。
    private_goal: >-
      想在天亮前鼓起勇气跟老周开口:她攒了一笔钱,想把店接下来自己继续开,
      哪怕老周觉得她还嫩。她以为只要诚意够,就还有挽回的余地。
    secret: >-
      她昨天整理吧台时,瞥见过抽屉里那份文件的抬头——一个连锁品牌的名字。
      她没敢细看,也没敢声张,一整晚都在自我怀疑:是不是自己看错了。
    plan: >-
      先把活干得无可挑剔,找一个只剩她和老周的安静时机说出接店的想法;
      同时忍不住想再确认一次抽屉里那份文件,又怕被发现。
    beliefs: []
    relationships:
      zhou: 80              # 对老周:深厚的师徒情与信赖(所以背叛感会更重)
      lin: 45             # 对林姐:面熟的常客,礼貌而已
